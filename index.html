<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Juicy Burger — Select Terminal</title>
<link rel="stylesheet" href="style.css">
<style>
  body { margin: 0; }
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a0a00;
    gap: 2.5rem;
    padding: 2rem;
  }
  .brand { text-align: center; }
  .brand .flame { font-size: 4rem; line-height: 1; }
  .brand h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2.8rem;
    color: #ff6b1a;
    letter-spacing: -1px;
    margin: 0.5rem 0 0;
    line-height: 1;
  }
  .brand p {
    color: #8a6a50;
    font-size: 0.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 0.6rem;
  }
  .terminal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 1.25rem;
    max-width: 760px;
    width: 100%;
  }
  .terminal-card {
    background: #2a1500;
    border: 1px solid #4a2800;
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    text-decoration: none;
    display: block;
  }
  .terminal-card:hover { background: #3a1f00; border-color: #ff6b1a; transform: translateY(-4px); }
  .terminal-card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .terminal-card h2 {
    font-family: 'Playfair Display', Georgia, serif;
    color: #ff9d57;
    font-size: 1.15rem;
    margin: 0 0 0.5rem;
  }
  .terminal-card p { color: #7a5a3a; font-size: 0.82rem; margin: 0; line-height: 1.5; }
  .terminal-card.admin-card { border-style: dashed; }
  .footer-note { color: #4a3020; font-size: 0.78rem; text-align: center; }
</style>
</head>
<body>
<div class="landing">
  <div class="brand">
    <div class="flame">🍔</div>
    <h1>The Juicy Burger</h1>
    <p>Select Your Terminal</p>
  </div>

  <div class="terminal-grid">
    <a href="front.html" class="terminal-card">
      <div class="icon">🧾</div>
      <h2>Front of House</h2>
      <p>Place orders, customize items &amp; handle payments</p>
    </a>
    <a href="kitchen.html" class="terminal-card">
      <div class="icon">👨‍🍳</div>
      <h2>Kitchen Display</h2>
      <p>View &amp; manage incoming orders in real-time</p>
    </a>
    <a href="admin.html" class="terminal-card admin-card">
      <div class="icon">⚙️</div>
      <h2>Menu Manager</h2>
      <p>Add, edit &amp; remove menu items &amp; pricing</p>
    </a>
  </div>

  <p class="footer-note">All terminals sync via Google Sheets &bull; No backend server required</p>
</div>
</body>
</html>
